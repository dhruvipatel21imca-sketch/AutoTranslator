<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Auto Translator</title>

    <style>
        body{
            font-family: Arial;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
        }

        textarea, select, button{
            width:100%;
            margin-top:10px;
            padding:10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌍 Auto Translator</h2>

    <textarea id="text" placeholder="Enter text"></textarea>

    <select id="language">
        <option value="hi">Hindi</option>
        <option value="gu">Gujarati</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ko">Korean</option>
    </select>

    <button onclick="translate()">Translate</button>

    <h3>Output:</h3>
    <p id="output"></p>
</div>

<script>

    function translate(){

        let text = document.getElementById("text").value;
        let lang = document.getElementById("language").value;

        fetch(`/api/translate?text=${encodeURIComponent(text)}&source=en&target=${lang}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("output").innerText = data.translatedText;
            })
            .catch(error => {
                document.getElementById("output").innerText = "Error!";
            });
    }

</script>

</body>
</html>
