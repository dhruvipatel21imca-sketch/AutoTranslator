<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <title>Auto Translator AI</title>

    <style>

        body{
            font-family: Arial,serif;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            width:600px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#333;
        }

        textarea{
            width:100%;
            height:120px;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            font-size:16px;
        }

        select{
            width:100%;
            padding:10px;
            border-radius:8px;
            margin-top:10px;
        }

        button{
            padding:12px;
            margin-top:10px;
            width:100%;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#00c6ff;
        }

        .result{
            margin-top:20px;
            background:#f2f2f2;
            padding:15px;
            border-radius:8px;
        }

        .mic{
            background:#ff4b5c;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🌍 Auto Translator AI</h1>
    <p style="text-align:center;color:#666;">
        AI Voice Translator • Speech Support • 100+ Languages
    </p>
    <label for="text"></label><textarea id="text" placeholder="Enter text..."></textarea>

    <label for="language"></label><select id="language">

        <option value="hi">Hindi</option>
        <option value="en">English</option>
        <option value="gu">Gujarati</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="es">Spanish</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="ar">Arabic</option>
        <option value="ru">Russian</option>

    </select>

    <button onclick="translate()">Translate</button>

    <button class="mic" onclick="startSpeech()">🎤 Voice Input</button>
    <div class="result">

        <h3>Translated Text</h3>

        <p id="output" style="font-size:18px;color:#333;"></p>

        <button onclick="speak()">🔊 Speak Translation</button>

    </div>

</div>

<script>

    function translate(){
        fetch(`/translator/translate?text=${encodeURIComponent(text)}&targetLanguage=${lang}`, {
            method: "GET"
        })
            .then(response => response.text())
            .then(data => {
                document.getElementById("output").innerText = data;
            });
        let text = document.getElementById("text").value;
        let lang = document.getElementById("language").value;

        fetch(`/translator/translate?text=${text}&targetLanguage=${lang}`)
            .then(response => response.text())
            .then(data => {

                document.getElementById("output").innerText = data;

            });

    }

    function speak(){

        let text = document.getElementById("output").innerText;

        let speech = new SpeechSynthesisUtterance(text);

        speech.lang = "en";

        speechSynthesis.speak(speech);

    }

    function startSpeech(){

        let recognition=new webkitSpeechRecognition();

        recognition.lang="en-US";

        recognition.onresult=function(event){

            document.getElementById("text").value=event.results[0][0].transcript;

        };

        recognition.start();

    }

</script>

</body>
</html>
