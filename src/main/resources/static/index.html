<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <title>Auto Translator</title>

    <style>
        body{
            font-family: Arial,emoji;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
        }

        textarea, select, button{
            width:100%;
            margin-top:10px;
            padding:10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌍 Auto Translator</h2>

    <label for="text"></label><textarea id="text" placeholder="Enter text"></textarea>

    <label for="language"></label><select id="language">
        <option value="hi">Hindi</option>
        <option value="gu">Gujarati</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ko">Korean</option>
    </select>

    <button onclick="translate()">Translate</button>
    <button onclick="startSpeech()">🎤 Voice Input</button>
    <button onclick="speak()">🔊 Speak</button>

    <h3>Output:</h3>
    <p id="output"></p>
</div>

<script>

    function translate(){

        let text = document.getElementById("text").value;
        let lang = document.getElementById("language").value;

        fetch(`/api/translate?text=${encodeURIComponent(text)}&source=en&target=${lang}`)
            .then(res => res.json())
            .then(data => {
                data.translatedText = undefined;
                document.getElementById("output").innerText = data.translatedText;
            })
            .catch(() => {
                document.getElementById("output").innerText = "Error!";
            });
    }

    // 🔊 Speak
    function speak(){
        let text = document.getElementById("output").innerText;
        let speech = new SpeechSynthesisUtterance(text);
        speech.lang = "en";
        speechSynthesis.speak(speech);
    }


    // 🎤 Voice Input
    function startSpeech(){
        let recognition = new webkitSpeechRecognition();
        recognition.lang = "en-US";

        recognition.onresult = function(event){
            document.getElementById("text").value =
                event.results[0][0].transcript;
        };

        recognition.start();
    }

</script>

</body>
</html>
