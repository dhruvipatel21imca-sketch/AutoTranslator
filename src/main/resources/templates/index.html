<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <title>Auto Translator</title>

    <style>
        body{
            font-family: Arial,emoji;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
        }

        textarea, select, button{
            width:100%;
            margin-top:10px;
            padding:10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌍 Auto Translator</h2>

    <label for="text"></label><textarea id="text" placeholder="Enter text"></textarea>

    <label for="language"></label><select id="language">
    <option value="hi">Hindi</option>
    <option value="gu">Gujarati</option>
    <option value="fr">French</option>
    <option value="de">German</option>
    <option value="ko">Korean</option>
    <option value="zh">Chinese</option>
    <option value="ar">Arabic</option>
    </select>

    <button onclick="translateText()">Translate</button>
    <button onclick="startVoice()">🎤 Voice</button>
    <button onclick="speakText()">🔊 Speak</button>

    <h3>Output:</h3>
    <p id="output"></p>
</div>

<script>
    function translateText() {
        let text = document.getElementById("text").value;
        let lang = document.getElementById("language").value;

        fetch(`/translator/translate?text=${text}&targetLanguage=${lang}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("output").innerText = data;
            })
            .catch(err => {
                document.getElementById("output").innerText = "Error: " + err;
            });
    }

    // 🎤 VOICE INPUT
    function startVoice() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Voice not supported in this browser");
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = "en-US";  // you can change

        recognition.start();

        recognition.onresult = function(event) {
            const speechText = event.results[0][0].transcript;
            document.getElementById("text").value = speechText;
        };

        recognition.onerror = function(event) {
            alert("Voice error: " + event.error);
        };
    }

    // 🔊 SPEAK OUTPUT
    function speakText() {
        let text = document.getElementById("output").innerText;

        if (!text) {
            alert("No text to speak");
            return;
        }

        const speech = new SpeechSynthesisUtterance(text);

        let lang = document.getElementById("language").value;

        if (lang === "hi") speech.lang = "hi-IN";
        else if (lang === "gu") speech.lang = "gu-IN";
        else if (lang === "ko") speech.lang = "ko-KR";
        else if (lang === "zh") speech.lang = "zh-CN";
        else if (lang === "ar") speech.lang = "ar-SA";
        else if (lang === "fr") speech.lang = "fr-FR";
        else if (lang === "de") speech.lang = "de-DE";
        else speech.lang = "en-US";

        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
