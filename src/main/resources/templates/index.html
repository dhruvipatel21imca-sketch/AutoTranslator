<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AutoTranslator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            resize: none;
            margin-bottom: 15px;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 25px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 10px;
            min-height: 50px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🌍 AutoTranslator</h1>

    <textarea id="text" placeholder="Enter text..."></textarea>

    <select id="language">
        <option value="hi">Hindi</option>
        <option value="gu">Gujarati</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ko">Korean</option>
        <option value="zh">Chinese</option>
        <option value="ar">Arabic</option>
    </select>

    <div>
        <button onclick="translateText()">Translate</button>
        <button onclick="startSpeech()">🎤 Speak</button>
        <button onclick="speak()">🔊 Listen</button>
    </div>

    <div class="output" id="output"></div>
</div>

<script>
    async function translateText() {
        const text = document.getElementById("text").value;
        const lang = document.getElementById("language").value;

        const response = await fetch(`/translator/translate?text=${text}&targetLanguage=${lang}`);
        const data = await response.json();

        document.getElementById("output").innerText = data.translatedText;
    }

    function speak() {
        const text = document.getElementById("output").innerText;
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = document.getElementById("language").value;
        window.speechSynthesis.speak(speech);
    }

    function startSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.onresult = function(event) {
            document.getElementById("text").value = event.results[0][0].transcript;
        };

        recognition.start();
    }
</script>

</body>
</html>
