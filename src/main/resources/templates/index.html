<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <title>Auto Translator</title>

    <style>
        body{
            font-family: Arial,emoji;
            background: linear-gradient(135deg,#4facfe,#00f2fe);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            padding:30px;
            border-radius:10px;
            width:500px;
        }

        textarea, select, button{
            width:100%;
            margin-top:10px;
            padding:10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌍 Auto Translator</h2>

    <label for="text"></label><textarea id="text" placeholder="Enter text"></textarea>

    <label for="language"></label><select id="language">
        <option value="hi">Hindi</option>
        <option value="gu">Gujarati</option>
        <option value="fr">French</option>
        <option value="de">German</option>
        <option value="ko">Korean</option>
    </select>

    <button onclick="translate()">Translate</button>
    <button onclick="startSpeech()">🎤 Voice Input</button>
    <button onclick="speak(undefined)">🔊 Speak</button>

    <h3>Output:</h3>
    <p id="output"></p>
</div>

<script>
    function translateText() {
        let text = document.getElementById("text").value;
        let lang = document.getElementById("language").value;

        fetch(`/translator/translate?text=${text}&targetLanguage=${lang}`)
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
            });
    }
</script>

</body>
</html>
